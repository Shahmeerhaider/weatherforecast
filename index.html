<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-cloud-sun me-2"></i>Weather Dashboard
            </a>
            <button id="darkModeToggle" class="btn btn-outline-light rounded-pill px-3">
                <i class="fas fa-moon"></i> Dark Mode
            </button>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card p-4 shadow">
                    <h5 class="card-title mb-3">Search City Weather</h5>
                    <div class="input-group">
                        <input type="text" id="cityInput" class="form-control form-control-lg" placeholder="Enter city name">
                        <button id="searchBtn" class="btn btn-primary btn-lg px-4">Search</button>
                    </div>
                    <div id="errorMsg" class="small mt-2"></div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-12 col-md-8 col-lg-6">
                <div id="weatherCard" class="card shadow-lg">
                    <div class="card-body p-4">
                        <div id="loadingIndicator" class="text-center py-5 d-none">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 mb-0">Fetching weather data...</p>
                        </div>
                        <div id="weatherInfo">
                            <div class="text-center py-5 text-muted">
                                <i class="fas fa-cloud-sun-rain fa-4x mb-3"></i>
                                <h5>Weather Dashboard</h5>
                                <p>Search for a city to get real-time weather</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-transparent fw-bold">
                        <i class="fas fa-history me-2"></i>Recent Searches
                    </div>
                    <div class="card-body">
                        <ul id="historyList" class="list-group list-group-flush">
                            <li class="list-group-item text-center text-muted">No searches yet</li>
                        </ul>
                    </div>
                    <div class="card-footer bg-transparent text-end">
                        <button id="clearHistoryBtn" class="btn btn-sm btn-outline-secondary">Clear History</button>
                    </div>
                </div>
                <div class="mt-3 small text-center text-secondary" id="lastUpdatedInfo">
                    <i class="far fa-calendar-alt"></i> Ready to search
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 pb-3 text-muted">
        <span>Powered by Open-Meteo API</span>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
